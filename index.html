<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>character counter</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h2>Character counter</h2>
        <textarea name="words" id="text" class="text" maxlength="200" placeholder="Type your text here"></textarea>
        <div class="counter-container">
            <p>
                Total characters : <span class="total" id="total"></span>
            </p>

            <p>
                Remaining : <span class="rem" id='rem'></span>
            </p>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
